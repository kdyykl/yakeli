<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>💖 我们的故事</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: #000005;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(20,10,60,0.7) 0%, transparent 55%),
                radial-gradient(ellipse at 20% 30%, rgba(10,20,60,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(15,10,50,0.5) 0%, transparent 50%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: white;
        }

        /* ── 星空层：星星直接放 viewport 内，不旋转容器 ── */
        .star-field {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        .star-field .star {
            position: absolute;
            pointer-events: all;
            cursor: pointer;
        }

        /* ── 星星：更大更亮，忽隐忽现 ── */
        .star {
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        .star:hover { filter: brightness(1.8); }

        @keyframes twinkle {
            0%   { opacity: 0;   transform: scale(0.4); }
            15%  { opacity: 1;   transform: scale(1.6); }
            30%  { opacity: 0.7; transform: scale(1.1); }
            50%  { opacity: 0;   transform: scale(0.3); }
            65%  { opacity: 1;   transform: scale(1.5); }
            80%  { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 0;   transform: scale(0.4); }
        }

        /* ── 日期气泡 ── */
        .star-label {
            position: fixed;
            background: rgba(255,255,255,0.97);
            color: #1a1a4e;
            font-size: clamp(10px, 3vw, 13px);
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
            transform: translate(-50%, -140%);
            box-shadow: 0 2px 16px rgba(100,120,255,0.35);
            animation: labelPop 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        .star-label::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.97);
            border-radius: 50%;
        }
        @keyframes labelPop {
            0%   { opacity: 0; transform: translate(-50%, -140%) scale(0.4); }
            100% { opacity: 1; transform: translate(-50%, -140%) scale(1); }
        }

        /* ── 流星 ── */
        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0.9), transparent);
            border-radius: 2px;
            animation: shoot linear forwards;
            opacity: 0;
        }
        @keyframes shoot {
            0%   { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            5%   { opacity: 1; }
            100% { transform: translateX(-400px) translateY(400px) rotate(-45deg); opacity: 0; }
        }

        /* ── 主文字 ── */
        .main-text {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease 0.5s both;
            width: 100%;
            max-width: 700px;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .days-text {
            font-size: clamp(1.6rem, 5vw, 3.8rem);
            font-weight: 300;
            letter-spacing: clamp(2px, 1vw, 6px);
            line-height: 1.4;
            text-shadow: 0 0 40px rgba(255,255,255,0.6);
            background: linear-gradient(135deg, #fff 0%, #ffd700 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
            word-break: keep-all;
        }
        @keyframes shimmer {
            0%   { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .sub-text {
            margin-top: 14px;
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: rgba(255,255,255,0.45);
            letter-spacing: 2px;
        }

        .hearts {
            margin-top: clamp(20px, 4vh, 40px);
            font-size: clamp(2rem, 6vw, 3.5rem);
            animation: heartbeat 1.5s ease-in-out infinite;
            line-height: 1;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.12); }
        }

        /* ── 音乐按钮 ── */
        .music-control {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .music-control:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .music-control::before { content: '🎵'; }
        .music-control.paused::before { content: '🔇'; }
        .music-control.paused { opacity: 0.5; }

        /* ── 导航按钮 ── */
        .nav-btn {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom, 20px));
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            color: rgba(255,255,255,0.75);
            font-size: clamp(0.8rem, 2.5vw, 0.95rem);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 100;
            white-space: nowrap;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.05); }
        .nav-prev { left: max(15px, env(safe-area-inset-left, 15px)); }
        .nav-next { right: max(15px, env(safe-area-inset-right, 15px)); }

        @media (max-width: 480px) {
            .days-text { letter-spacing: 1px; }
            .nav-btn { padding: 9px 16px; }
        }
        @media (min-width: 1200px) {
            .days-text { font-size: 4rem; }
            .hearts { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <button class="music-control" id="musicBtn" onclick="toggleMusic()"></button>
    <audio id="bgMusic" loop preload="auto"
           src="https://music.163.com/song/media/outer/url?id=1410647903.mp3"></audio>

    <div class="star-field" id="starField"></div>

    <div class="main-text">
        <div class="days-text" id="daysText">亚克力与可达鸭已经92天</div>
        <div class="sub-text" id="dateText"></div>
        <div class="hearts">🦆 ❤️</div>
    </div>

    <a href="target.html"       class="nav-btn nav-prev">← 表白</a>
    <a href="heart_popups.html"  class="nav-btn nav-next">首页 →</a>

    <script>
        /* ── 音乐 ── */
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic  = document.getElementById('bgMusic');
        let musicStarted = false;
        let isPaused = false;

        function tryPlay() { bgMusic.play().catch(() => {}); }

        function toggleMusic() {
            if (!musicStarted) {
                tryPlay();
                musicStarted = true;
                isPaused = false;
                musicBtn.classList.remove('paused');
            } else {
                isPaused = !isPaused;
                isPaused ? bgMusic.pause() : tryPlay();
                musicBtn.classList.toggle('paused', isPaused);
            }
        }

        document.addEventListener('click', function initMusic() {
            if (!musicStarted) { tryPlay(); musicStarted = true; }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        window.addEventListener('load', () => {
            setTimeout(() => {
                if (!musicStarted) { tryPlay(); musicStarted = true; }
            }, 800);
        });

        /* ── 天数计算 ── */
        const BASE_DATE = new Date('2026-04-16T00:00:00+08:00');
        const BASE_DAYS  = 92;

        function calcDays() {
            const now = new Date();
            const bjNow = new Date(now.getTime() + (480 + now.getTimezoneOffset()) * 60000);
            bjNow.setHours(0, 0, 0, 0);
            const base = new Date(BASE_DATE);
            base.setHours(0, 0, 0, 0);
            return BASE_DAYS + Math.floor((bjNow - base) / 86400000);
        }

        function formatDate(d) {
            return d.getFullYear() + '.' +
                String(d.getMonth() + 1).padStart(2, '0') + '.' +
                String(d.getDate()).padStart(2, '0');
        }

        function updateDisplay() {
            const days = calcDays();
            document.getElementById('daysText').textContent = '亚克力与可达鸭已经' + days + '天';
            const now = new Date();
            document.getElementById('dateText').textContent = formatDate(now);
        }

        updateDisplay();
        setInterval(updateDisplay, 60000);

        /* ── 星星日期系统 ── */
        const STAR_START = new Date('2026-01-14T00:00:00+08:00');
        const today2 = new Date();
        const bjToday = new Date(today2.getTime() + (480 + today2.getTimezoneOffset()) * 60000);
        bjToday.setHours(0, 0, 0, 0);
        const todayStarIndex = Math.floor((bjToday - STAR_START) / 86400000) + 1;
        const extraStars = 30;
        const totalStars = todayStarIndex + extraStars;

        const starField = document.getElementById('starField');
        const STAR_COUNT = totalStars;

        for (let i = 0; i < STAR_COUNT; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            const hasDate = i < todayStarIndex;

            const size = hasDate
                ? Math.random() * 3 + 2    // 2~5px
                : Math.random() * 2 + 1;    // 1~3px

            // 直接放在 viewport 内，5%~95% 范围内，永不裁剪
            const x = 5 + Math.random() * 90;   // 5~95%
            const y = 5 + Math.random() * 90;   // 5~95%

            const dur   = Math.random() * 4 + 2.5;
            const delay = Math.random() * 8;
            const glow  = size * 4;

            const glowColor = hasDate
                ? `rgba(200,220,255,0.9), 0 0 ${glow*2}px rgba(150,180,255,0.5)`
                : `rgba(255,255,255,0.85), 0 0 ${glow*2}px rgba(180,200,255,0.4)`;

            star.style.cssText =
                'width:'  + size + 'px;' +
                'height:' + size + 'px;' +
                'left:'   + x.toFixed(2) + '%;' +
                'top:'    + y.toFixed(2) + '%;' +
                '--dur:'  + dur.toFixed(1) + 's;' +
                '--delay:' + delay.toFixed(1) + 's;' +
                'box-shadow:0 0 ' + glow + 'px ' + (glow/2) + 'px ' + glowColor + ';';

            if (hasDate) {
                const starDate = new Date(STAR_START);
                starDate.setDate(starDate.getDate() + i);
                const label = formatDate(starDate);

                star.addEventListener('click', (function(l, sx, sy) {
                    return function(e) {
                        e.stopPropagation();
                        showLabel(l, sx, sy);
                    };
                })(label, x, y));
            }

            starField.appendChild(star);
        }

        function showLabel(text, x, y) {
            document.querySelectorAll('.star-label').forEach(el => el.remove());
            const label = document.createElement('div');
            label.className = 'star-label';
            label.textContent = '✨ ' + text;
            label.style.left = x + '%';
            label.style.top  = y + '%';
            document.body.appendChild(label);
            setTimeout(() => {
                label.style.transition = 'opacity 0.4s';
                label.style.opacity = '0';
                setTimeout(() => label.remove(), 400);
            }, 2500);
        }

        /* ── 流星 ── */
        function createShootingStar() {
            const s = document.createElement('div');
            s.className = 'shooting-star';
            s.style.cssText =
                'left:' + (20 + Math.random() * 60) + '%;' +
                'top:'  + (5  + Math.random() * 45) + '%;' +
                'width:' + (100 + Math.random() * 150) + 'px;' +
                'animation-duration:' + (0.7 + Math.random() * 0.6) + 's;';
            starField.appendChild(s);
            setTimeout(() => s.remove(), 2000);
            setTimeout(createShootingStar, 6000 + Math.random() * 12000);
        }
        for (let i = 0; i < 5; i++) {
            setTimeout(createShootingStar, i * 6000 + Math.random() * 3000);
        }

        /* ── 调试信息（临时）: 打印星星数量 ── */
        console.log('星星总数:', STAR_COUNT, '  有日期的:', todayStarIndex);
    </script>
</body>
</html>
