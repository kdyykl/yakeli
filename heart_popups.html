<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🦆 来自可达鸭的心动信号</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0520 0%, #1a0a3e 40%, #2d1050 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            position: relative;
        }

        /* 音乐控制 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .music-control:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .music-control::before { content: '🎵'; }
        .music-control.paused::before { content: '🔇'; }
        .music-control.paused { opacity: 0.6; }

        /* 漂浮粒子 */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* 中心心形 */
        .heart-wrap {
            position: relative;
            animation: heartbeat 1.2s ease-in-out infinite;
            cursor: pointer;
            z-index: 10;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }
        .heart {
            width: 120px;
            height: 120px;
            background: linear-gradient(180deg, #ff6b9d, #c44569);
            position: relative;
            transform: rotate(-45deg);
            margin: 60px auto;
            box-shadow: 0 0 40px rgba(255, 107, 157, 0.6), 0 0 80px rgba(255, 107, 157, 0.3);
        }
        .heart::before, .heart::after {
            content: '';
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: inherit;
            position: absolute;
        }
        .heart::before { top: -60px; left: 0; }
        .heart::after { left: 60px; top: 0; }

        /* 标题 */
        .main-text {
            text-align: center;
            color: white;
            z-index: 10;
            position: relative;
        }
        .main-text h1 {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            margin-bottom: 10px;
            animation: fadeInUp 1s ease 0.5s both;
        }
        .main-text p {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: rgba(255,255,255,0.6);
            animation: fadeInUp 1s ease 0.8s both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 文字轮播 */
        .love-phrases {
            margin-top: 30px;
            height: 40px;
            overflow: hidden;
            animation: fadeInUp 1s ease 1.1s both;
        }
        .phrase {
            color: #ff9ec4;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: bold;
            text-align: center;
            height: 40px;
            line-height: 40px;
            animation: phraseCycle 6s ease-in-out infinite;
            text-shadow: 0 0 15px rgba(255,107,157,0.6);
        }
        @keyframes phraseCycle {
            0%, 20% { opacity: 1; transform: translateY(0); }
            25%, 45% { opacity: 0; transform: translateY(-40px); }
            50%, 70% { opacity: 1; transform: translateY(0); }
            75%, 95% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 按钮 */
        .btn-enter {
            display: inline-block;
            margin-top: 40px;
            padding: 16px 50px;
            font-size: clamp(1rem, 2.5vw, 1.1rem);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.5);
            animation: fadeInUp 1s ease 1.4s both;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
        }
        .btn-enter:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 30px rgba(255, 107, 157, 0.7);
        }

        /* 底部署名 */
        .signature {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.25);
            font-size: 0.85rem;
            animation: fadeInUp 1s ease 1.8s both;
        }

        /* 闪光 */
        .sparkle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1s ease forwards;
        }
        @keyframes sparkleAnim {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        @media (max-width: 600px) {
            .heart { width: 80px; height: 80px; }
            .heart::before, .heart::after { width: 80px; height: 80px; }
            .heart::before { top: -40px !important; }
            .heart::after { left: 40px !important; }
            .btn-enter { padding: 13px 36px; }
            .love-phrases { margin-top: 20px; }
            .music-control { width: 45px; height: 45px; top: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <button class="music-control" id="musicBtn" onclick="toggleMusic()"></button>
    <audio id="bgMusic" loop preload="auto" src="https://music.163.com/song/media/outer/url?id=2083785152.mp3"></audio>

    <div class="main-text">
        <h1>🦆 可达鸭有话想对你说...</h1>
        <p>点一颗心，了解鸭鸭的心意</p>
    </div>

    <div class="heart-wrap" onclick="onHeartClick(event)">
        <div class="heart"></div>
    </div>

    <div class="love-phrases">
        <div class="phrase" id="phraseText">❤️ 可达鸭超喜欢你 ❤️</div>
    </div>

    <a href="target.html" class="btn-enter">💗 开启心动模式</a>

    <div class="signature">Made with 💖 by 可达鸭</div>

    <script>
        // 音乐（邓紫棋 - 唯一）
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        let musicStarted = false;
        let isPaused = false;

        function toggleMusic() {
            if (!musicStarted) {
                bgMusic.play().catch(() => bgMusic.src = 'https://y.music.163.com/m/song?id=2083785152&appid=16073860&临沂=true');
                musicStarted = true;
                isPaused = false;
                musicBtn.classList.remove('paused');
            } else {
                isPaused = !isPaused;
                isPaused ? bgMusic.pause() : bgMusic.play();
                musicBtn.classList.toggle('paused', isPaused);
            }
        }

        document.addEventListener('click', function initMusic() {
            if (!musicStarted) {
                bgMusic.play().catch(() => bgMusic.src = 'https://y.music.163.com/m/song?id=2083785152&appid=16073860&临沂=true');
                musicStarted = true;
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        // 粒子
        const colors = ['#ff6b9d','#ff9ec4','#ff4d6d','#ffb3c6','#ff85a2','#ffc2d1'];
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 16 + 8;
            const color = colors[Math.floor(Math.random() * colors.length)];
            p.style.cssText = `
                left: ${Math.random() * 100}vw;
                width: ${size}px;
                height: ${size}px;
                background: ${color};
                animation-duration: ${Math.random() * 4 + 5}s;
                animation-delay: ${Math.random() * 2}s;
                box-shadow: 0 0 ${size}px ${color};
            `;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 10000);
        }
        setInterval(createParticle, 300);
        for (let i = 0; i < 20; i++) setTimeout(createParticle, i * 200);

        // 心形点击
        function onHeartClick(e) {
            const phrases = [
                '❤️ 可达鸭超喜欢你 ❤️',
                '💗 你的名字是亚克力吗 💗',
                '🌸 鸭鸭想你想得睡不着 🌸',
                '🦆 点击右边按钮认识我 🦆',
                '💕 心跳加速中... 💕'
            ];
            document.getElementById('phraseText').textContent = phrases[Math.floor(Math.random() * phrases.length)];
            for (let i = 0; i < 12; i++) createSparkle(e.clientX, e.clientY);
        }

        function createSparkle(x, y) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = (x + (Math.random()-0.5)*80) + 'px';
            s.style.top = (y + (Math.random()-0.5)*80) + 'px';
            s.style.animationDuration = (Math.random()*0.5+0.5) + 's';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }
    </script>
</body>
</html>
